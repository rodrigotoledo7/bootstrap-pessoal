# --- CONFIGURAÇÕES GERAIS ---

# Habilita suporte a 256 cores (True Color) para não quebrar temas do Neovim/Zsh
set -g default-terminal "screen-256color"
set-option -sa-terminal-overrides ",xterm-256color:Tc"

# Aumenta o histórico de linhas para navegação
set -g history-limit 10000

# Habilita o uso do mouse para rolar o terminal e redimensionar painéis
set -g mouse on

# Diminui o tempo de resposta do botão ESC (melhora muito o uso do Vim/Neovim)
set -s escape-time 0

# --- ATALHOS MAIS INTUITIVOS ---

# Atalhos para dividir a tela mais fáceis de lembrar:
# Prefix + | divide verticalmente
# Prefix + - divide horizontalmente
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navegação entre painéis usando as teclas do Vim (sem precisar das setas)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- ESTILO VISUAL (Simples e Elegante) ---
set -g status-bg black
set -g status-fg white
set -g status-interval 60
set -g status-left-length 30
set -g status-left '#[fg=green](#S) '
set -g status-right '#[fg=yellow]%H:%M #[default]'
